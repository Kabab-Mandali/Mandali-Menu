<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Mandali Kabab Restaurant — Menu · Isa Town, Bahrain</title>
  <meta name="description" content="Browse the menu of Mandali Kabab Restaurant in Isa Town, Bahrain — charcoal grills, Persian and Bahraini dishes, seafood and more. Serving since 1930." />
  <meta name="theme-color" content="#1c120c" />
  <link rel="icon" type="image/png" href="assets/img/favicon.png" />
  <link rel="apple-touch-icon" href="assets/img/favicon.png" />
  <link rel="manifest" href="site.webmanifest" />

  <!-- Open Graph -->
  <meta property="og:type" content="restaurant" />
  <meta property="og:title" content="Mandali Kabab Restaurant — Menu" />
  <meta property="og:description" content="Charcoal kabab and Persian-Bahraini hospitality in Isa Town, since 1930." />
  <meta property="og:image" content="assets/img/hero.jpg" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Inter:wght@400;500;600;700&family=Reem+Kufi:wght@400;500;600;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="assets/css/style.css" />

  <!-- SEO: Restaurant structured data -->
  <script type="application/ld+json" id="ld-json"></script>
</head>
<body>

  <header class="topbar">
    <div class="topbar__brand">
      <img class="topbar__logo" src="assets/img/logo.png" alt="Mandali logo" width="34" height="34" />
      <div class="topbar__name" id="bar-name">Mandali<small id="bar-sub">Kabab Restaurant</small></div>
    </div>
    <div class="langtoggle" role="group" aria-label="Language">
      <button id="lang-en" type="button" aria-pressed="true">EN</button>
      <button id="lang-ar" type="button" aria-pressed="false">عربي</button>
    </div>
  </header>

  <!-- HERO -->
  <section class="hero">
    <img class="hero__img" src="assets/img/hero.jpg" alt="Mandali charcoal kabab platter" />
    <div class="hero__scrim girih"></div>
    <div class="hero__inner">
      <img class="hero__logo" src="assets/img/logo.png" alt="Mandali" width="116" height="116" />
      <div class="hero__est" id="hero-est">Since 1930</div>
      <h1 class="hero__title" id="hero-title">Mandali</h1>
      <div class="hero__sub" id="hero-sub">Kabab Restaurant</div>
      <p class="hero__tagline" id="hero-tagline"></p>
      <a class="hero__scroll" href="#menu" id="hero-scroll">
        <span id="hero-scroll-label">View menu</span>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
      </a>
    </div>
  </section>

  <!-- INFO -->
  <section class="info wrap" aria-label="Restaurant information">
    <div class="info__card reveal">
      <div class="status" id="status"></div>
      <div class="hours" id="hours"></div>
      <div class="actions">
        <a class="action action--call" id="act-call">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3-8.6A2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1 1 .4 1.9.7 2.8a2 2 0 0 1-.5 2.1L8.1 9.9a16 16 0 0 0 6 6l1.3-1.3a2 2 0 0 1 2.1-.4c.9.3 1.8.6 2.8.7a2 2 0 0 1 1.7 2z"/></svg>
          <span id="act-call-label">Call</span>
        </a>
        <a class="action action--wa" id="act-wa" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M.06 24l1.7-6.16A11.86 11.86 0 1 1 12 24a11.9 11.9 0 0 1-5.7-1.46L.06 24zM6.6 20.1l.37.22a9.86 9.86 0 1 0-3.3-3.3l.24.38-1 3.66 3.69-.96zM18 14.3c-.07-.12-.26-.2-.55-.34s-1.74-.86-2-.96-.46-.14-.65.14-.74.95-.9 1.14-.34.21-.62.07a8.1 8.1 0 0 1-2.4-1.48 9 9 0 0 1-1.66-2.06c-.17-.3 0-.46.13-.6s.29-.34.43-.51.18-.29.28-.48.05-.36-.02-.5-.65-1.56-.89-2.14-.47-.49-.65-.5h-.55a1.06 1.06 0 0 0-.77.36 3.2 3.2 0 0 0-1 2.4 5.56 5.56 0 0 0 1.17 2.95 12.73 12.73 0 0 0 4.88 4.32c.68.3 1.21.47 1.63.6a3.92 3.92 0 0 0 1.8.12 2.94 2.94 0 0 0 1.93-1.36 2.39 2.39 0 0 0 .17-1.36z"/></svg>
          <span id="act-wa-label">WhatsApp</span>
        </a>
        <a class="action action--map" id="act-map" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 10c0 7-9 12-9 12s-9-5-9-12a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          <span id="act-map-label">Location</span>
        </a>
      </div>
      <div class="action__addr">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 10c0 7-9 12-9 12s-9-5-9-12a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        <span id="addr"></span>
      </div>
    </div>
  </section>

  <!-- CATEGORY NAV -->
  <nav class="catnav" aria-label="Menu categories">
    <div class="catnav__scroll" id="catnav"></div>
  </nav>

  <!-- MENU -->
  <main class="menu wrap" id="menu"></main>

  <!-- HERITAGE -->
  <section class="wrap">
    <div class="heritage reveal">
      <img src="assets/img/ambiance.jpg" alt="Mandali dining room" />
      <div class="heritage__scrim girih"></div>
      <div class="heritage__inner">
        <div class="heritage__num" id="her-num">90+</div>
        <p id="her-text"></p>
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="footer__inner">
      <img class="footer__logo" src="assets/img/logo.png" alt="Mandali" width="64" height="64" />
      <div class="footer__name" id="foot-name">Mandali</div>
      <div class="footer__social">
        <a id="foot-ig" target="_blank" rel="noopener" aria-label="Instagram">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>
        </a>
        <a id="foot-wa" target="_blank" rel="noopener" aria-label="WhatsApp">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M.06 24l1.7-6.16A11.86 11.86 0 1 1 12 24a11.9 11.9 0 0 1-5.7-1.46L.06 24zM6.6 20.1l.37.22a9.86 9.86 0 1 0-3.3-3.3l.24.38-1 3.66 3.69-.96z"/></svg>
        </a>
        <a id="foot-map" target="_blank" rel="noopener" aria-label="Location">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 10c0 7-9 12-9 12s-9-5-9-12a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        </a>
      </div>
      <div class="footer__meta" id="foot-meta"></div>
      <div class="footer__note" id="foot-note"></div>
      <a class="footer__admin" href="admin.html" id="foot-admin">Staff login</a>
    </div>
  </footer>

  <script src="assets/js/seed.js"></script>
  <script src="assets/js/store.js"></script>
  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/menu.js"></script>
</body>
</html>
