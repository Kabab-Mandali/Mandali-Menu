<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Mandali · Admin</title>
  <link rel="icon" type="image/png" href="assets/img/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Inter:wght@400;500;600;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/admin.css" />
</head>
<body>

  <!-- LOGIN -->
  <div class="login" id="login">
    <div class="login__card">
      <img class="login__logo" src="assets/img/logo.png" alt="Mandali" />
      <h1 class="login__title">Mandali Admin</h1>
      <p class="login__sub">Sign in to manage the menu</p>
      <label class="field">
        <input type="password" id="pw" placeholder="Password" autocomplete="current-password" />
      </label>
      <button class="btn btn--block" id="login-btn">Sign in</button>
      <div class="login__err" id="login-err"></div>
    </div>
  </div>

  <!-- DASHBOARD SHELL -->
  <div class="shell" id="shell">
    <div class="adminbar">
      <div class="adminbar__brand"><img src="assets/img/logo.png" alt="" /> Mandali Admin</div>
      <div class="adminbar__actions">
        <a class="ghost" href="index.html" target="_blank" rel="noopener">View menu ↗</a>
        <button class="ghost" id="logout">Sign out</button>
      </div>
    </div>

    <nav class="tabs" id="tabs">
      <button class="tab is-active" data-view="menu">Menu</button>
      <button class="tab" data-view="options">Option groups</button>
      <button class="tab" data-view="info">Restaurant info</button>
      <button class="tab" data-view="backup">Backup &amp; publish</button>
    </nav>

    <div class="view" id="view"></div>
  </div>

  <!-- MODAL -->
  <div class="modal" id="modal" role="dialog" aria-modal="true">
    <div class="modal__sheet" id="modal-sheet"></div>
  </div>

  <div class="toast" id="toast"></div>

  <script>window.MANDALI_ADMIN = true;</script>
  <script src="assets/js/seed.js"></script>
  <script src="assets/js/store.js"></script>
  <script src="assets/js/admin.js"></script>
</body>
</html>
